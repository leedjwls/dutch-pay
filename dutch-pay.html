<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더치페이 정산</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17;
  --surface: #1a1827;
  --surface2: #221f33;
  --accent: #ff6b35;
  --accent2: #f7c59f;
  --green: #3dd68c;
  --red: #ff4d6d;
  --gold: #ffd60a;
  --text: #fffffe;
  --muted: #a7a9be;
  --border: rgba(255,255,255,0.08);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
}
body::before {
  content: '';
  position: fixed; top: -200px; right: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.step { display: none; }
.step.active { display: block; }

/* ── STEP 1 ── */
.setup-wrap {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px 24px; position: relative; z-index: 1;
}
.logo { text-align: center; margin-bottom: 48px; }
.logo-emoji { font-size: 56px; display: block; filter: drop-shadow(0 0 24px rgba(255,107,53,0.5)); margin-bottom: 12px; }
.logo h1 {
  font-family: 'Gmarket Sans', sans-serif; font-size: 32px; font-weight: 700;
  background: linear-gradient(135deg, #ff6b35, #f7c59f);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo p { color: var(--muted); font-size: 13px; margin-top: 8px; }

.setup-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 24px; padding: 32px; width: 100%; max-width: 400px;
}
.setup-card h2 { font-family: 'Gmarket Sans', sans-serif; font-size: 18px; margin-bottom: 28px; color: var(--accent2); }

.field { margin-bottom: 20px; }
.field label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px;
}
.counter-row {
  display: flex; align-items: center;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
}
.counter-btn {
  width: 48px; height: 48px; background: transparent; border: none;
  color: var(--accent); font-size: 22px; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
}
.counter-btn:hover { background: rgba(255,107,53,0.1); }
.counter-val { flex: 1; text-align: center; font-family: 'Gmarket Sans', sans-serif; font-size: 24px; font-weight: 700; }

.start-btn {
  width: 100%; margin-top: 8px; padding: 16px;
  background: linear-gradient(135deg, #ff6b35, #ff8c5a);
  border: none; border-radius: 14px; color: white; cursor: pointer;
  font-family: 'Gmarket Sans', sans-serif; font-size: 16px; font-weight: 700;
  transition: all 0.2s; box-shadow: 0 8px 24px rgba(255,107,53,0.3);
}
.start-btn:hover { transform: translateY(-2px); }

/* ── STEP 2 ── */
.page-wrap { max-width: 520px; margin: 0 auto; padding: 32px 20px; position: relative; z-index: 1; }
.page-header { margin-bottom: 24px; }
.page-header h2 { font-family: 'Gmarket Sans', sans-serif; font-size: 22px; }
.page-header p { color: var(--muted); font-size: 13px; margin-top: 6px; }

.badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.badge {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 50px; padding: 4px 12px; font-size: 12px; color: var(--muted);
}
.badge span { color: var(--accent2); font-weight: 700; }

.name-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.name-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  animation: fadeUp 0.2s ease both;
}
.name-row.bj-row { border-color: rgba(255,214,10,0.35); background: rgba(255,214,10,0.05); }
.name-num {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.bj-badge {
  background: rgba(255,214,10,0.2); border: 1px solid rgba(255,214,10,0.4);
  border-radius: 50px; padding: 2px 8px; font-size: 10px;
  color: var(--gold); font-weight: 700; white-space: nowrap;
}
.name-input {
  flex: 1; background: transparent; border: none;
  color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 15px; outline: none;
}
.name-input::placeholder { color: var(--muted); }
.name-input:disabled { color: var(--gold); font-weight: 700; cursor: default; }

.btn-primary {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, #ff6b35, #ff8c5a);
  border: none; border-radius: 14px; color: white; cursor: pointer;
  font-family: 'Gmarket Sans', sans-serif; font-size: 15px; font-weight: 700;
  transition: all 0.2s; box-shadow: 0 8px 24px rgba(255,107,53,0.25);
}
.btn-primary:hover { transform: translateY(-2px); }

/* ── STEP 3 ── */
.sheet-wrap { padding: 24px 16px; max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }
.sheet-header {
  margin-bottom: 20px;
  display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px;
}
.sheet-header h2 { font-family: 'Gmarket Sans', sans-serif; font-size: 20px; }
.sheet-header p { color: var(--muted); font-size: 12px; margin-top: 4px; }
.back-btn {
  background: transparent; border: 1px solid var(--border); border-radius: 10px;
  color: var(--muted); cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; padding: 8px 16px; transition: all 0.2s;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 차수 금액 카드 */
.round-costs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.round-cost-card {
  flex: 1; min-width: 100px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px;
}
.round-cost-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
}
.round-cost-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; padding: 8px 10px; width: 100%; outline: none;
  transition: border-color 0.2s; text-align: right;
}
.round-cost-input:focus { border-color: var(--accent); }
.round-cost-input::placeholder { color: var(--muted); }

/* 테이블 */
.sheet-table-wrap {
  overflow-x: auto;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 16px;
}
.sheet-table { width: 100%; border-collapse: collapse; }
.sheet-table th { padding: 0; border-bottom: 1px solid var(--border); }
.sheet-table th.name-th {
  text-align: left; padding: 14px 16px;
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
  min-width: 110px;
}
.sheet-table th.prepay-th {
  text-align: left; padding: 14px 12px;
  font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
  min-width: 110px;
  border-left: 1px solid var(--border);
}
.sheet-table td { padding: 0; border-bottom: 1px solid var(--border); }
.sheet-table tr:last-child td { border-bottom: none; }

.name-cell {
  padding: 0 16px; font-size: 14px;
  display: flex; align-items: center; gap: 8px; min-width: 110px; height: 52px;
}
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.bj-crown { font-size: 12px; margin-left: 2px; }

/* 체크 셀 */
.check-cell { text-align: center; vertical-align: middle; }
.check-btn {
  width: 100%; height: 52px; background: transparent; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.check-btn:hover { background: rgba(255,255,255,0.04); }
.check-icon {
  width: 28px; height: 28px; border-radius: 8px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.15s;
}
.check-btn.checked .check-icon {
  background: var(--green); border-color: var(--green);
  box-shadow: 0 0 12px rgba(61,214,140,0.3);
}

/* 선입금 셀 */
.prepay-cell {
  border-left: 1px solid var(--border);
  padding: 8px 12px; min-width: 110px;
}
.prepay-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; padding: 6px 8px; width: 100%; outline: none;
  transition: border-color 0.2s; text-align: right;
}
.prepay-input:focus { border-color: rgba(255,214,10,0.5); }
.prepay-input::placeholder { color: rgba(167,169,190,0.5); }

/* 차수 헤더 버튼 */
.round-header-btn {
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 12px; width: 100%; transition: background 0.15s; border-radius: 8px;
}
.round-header-btn:hover { background: rgba(255,255,255,0.05); }
.round-header-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; }
.round-count-badge {
  background: var(--surface2); border-radius: 50px;
  padding: 2px 8px; font-size: 11px; color: var(--accent2); font-weight: 700;
}

/* 합계 */
.total-summary {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px;
  background: linear-gradient(135deg, rgba(255,107,53,0.12), rgba(247,197,159,0.06));
  border: 1px solid rgba(255,107,53,0.25); border-radius: var(--radius); margin-bottom: 16px;
}
.total-label { font-size: 13px; color: var(--muted); }
.total-val { font-family: 'Gmarket Sans', sans-serif; font-size: 28px; font-weight: 700; color: var(--accent2); }

/* 결과 */
.result-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
}
.result-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(61,214,140,0.08), transparent);
  display: flex; justify-content: space-between; align-items: center;
}
.result-header h3 { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--green); text-transform: uppercase; }
.bj-discount-note {
  font-size: 11px; color: var(--gold);
  background: rgba(255,214,10,0.1); border: 1px solid rgba(255,214,10,0.25);
  border-radius: 50px; padding: 2px 10px;
}

.result-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--border); transition: background 0.15s;
}
.result-row:last-child { border-bottom: none; }
.result-row:hover { background: rgba(255,255,255,0.02); }
.result-row.bj-row-result { background: rgba(255,214,10,0.04); }

.result-name { display: flex; align-items: center; gap: 10px; font-size: 14px; }
.result-detail { text-align: right; }
.result-amount { font-family: 'Gmarket Sans', sans-serif; font-size: 18px; font-weight: 700; color: var(--green); }
.result-amount.zero { color: var(--muted); }
.result-amount.refund { color: var(--red); }
.result-rounds { font-size: 11px; color: var(--muted); margin-top: 2px; }
.result-prepay-note { font-size: 11px; color: var(--gold); margin-top: 2px; }

/* 공유 */
.share-btn {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, #ff6b35, #ff8c5a);
  border: none; border-radius: var(--radius); color: white; cursor: pointer;
  font-family: 'Gmarket Sans', sans-serif; font-size: 15px; font-weight: 700;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  gap: 8px; box-shadow: 0 8px 24px rgba(255,107,53,0.3);
}
.share-btn:hover { transform: translateY(-2px); }

.copy-toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--green); color: var(--bg);
  font-weight: 700; font-size: 13px; padding: 12px 24px;
  border-radius: 50px; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999; white-space: nowrap;
}
.copy-toast.show { transform: translateX(-50%) translateY(0); }

/* 벙주 감액 안내 */
.discount-info {
  background: rgba(255,214,10,0.06); border: 1px solid rgba(255,214,10,0.2);
  border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: var(--muted);
  line-height: 1.7;
}
.discount-info strong { color: var(--gold); }

/* avatar palette */
.av0{background:#ff6b35;color:#fff}.av1{background:#3dd68c;color:#0f0e17}
.av2{background:#7b6ff0;color:#fff}.av3{background:#f7c59f;color:#1a1827}
.av4{background:#ff4d6d;color:#fff}.av5{background:#60a5fa;color:#0f0e17}
.av6{background:#ffd60a;color:#1a1827}.av7{background:#c77dff;color:#fff}
.av8{background:#f472b6;color:#fff}.av9{background:#34d399;color:#0f0e17}

/* number input 스피너(화살표) 제거 */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

@keyframes fadeUp {
  from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<!-- STEP 1: 설정 -->
<div class="step active" id="step1">
  <div class="setup-wrap">
    <div class="logo">
      <span class="logo-emoji">🧾</span>
      <h1>더치페이 정산</h1>
      <p>인원과 차수를 설정하고 시작하세요</p>
    </div>
    <div class="setup-card">
      <h2>기본 설정</h2>
      <div class="field">
        <label>총 인원</label>
        <div class="counter-row">
          <button class="counter-btn" onclick="change('people',-1)">−</button>
          <div class="counter-val" id="peopleVal">6</div>
          <button class="counter-btn" onclick="change('people',1)">+</button>
        </div>
      </div>
      <div class="field">
        <label>차수</label>
        <div class="counter-row">
          <button class="counter-btn" onclick="change('rounds',-1)">−</button>
          <div class="counter-val" id="roundsVal">2</div>
          <button class="counter-btn" onclick="change('rounds',1)">+</button>
        </div>
      </div>
      <button class="start-btn" onclick="goStep2()">이름 입력하기 →</button>
    </div>
  </div>
</div>

<!-- STEP 2: 이름 입력 -->
<div class="step" id="step2">
  <div class="page-wrap">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <div class="page-header" style="margin-bottom:0">
        <h2>이름 입력</h2>
        <p>첫 번째는 벙주로 고정됩니다</p>
      </div>
      <button class="back-btn" onclick="goStep1()">← 인원/차수 수정</button>
    </div>
    <div class="badge-row" id="settingBadges"></div>
    <div class="name-list" id="nameList"></div>
    <button class="btn-primary" onclick="goStep3()">시트 만들기 →</button>
  </div>
</div>

<!-- STEP 3: 시트 + 결과 -->
<div class="step" id="step3">
  <div class="sheet-wrap">
    <div class="sheet-header">
      <div>
        <h2>참여 시트</h2>
        <p>차수 금액 입력 후 참여 인원을 체크하세요</p>
      </div>
      <button class="back-btn" onclick="goStep2()">← 이름 수정</button>
    </div>

    <div class="discount-info" id="discountInfo"></div>
    <div class="round-costs" id="roundCosts"></div>

    <div class="sheet-table-wrap">
      <table class="sheet-table" id="sheetTable"></table>
    </div>

    <div class="total-summary">
      <span class="total-label">총 금액</span>
      <span class="total-val" id="grandTotal">₩0</span>
    </div>

    <div class="result-wrap">
      <div class="result-header">
        <h3>💰 인원별 정산</h3>
        <span class="bj-discount-note" id="discountLabel"></span>
      </div>
      <div id="resultRows"></div>
    </div>

    <button class="share-btn" onclick="shareResult()">🔗 링크로 공유</button>
  </div>
</div>

<div class="copy-toast" id="copyToast">✅ 링크 복사 완료!</div>

<script>
let cfg = { people: 6, rounds: 2 };
let names = [];
let roundCosts = [];
let checks = [];
let prepays = []; // prepays[pi] = 선입금액

// ─── 벙주 감액 로직 ───
// cnt: 해당 차수 참여인원
function getBjDiscount(cnt) {
  if (cnt >= 22) return 20000;
  if (cnt >= 11) return 10000;
  if (cnt >= 6)  return 5000;
  return 0;
}

function change(key, delta) {
  const min = key === 'people' ? 2 : 1;
  const max = key === 'people' ? 30 : 8;
  cfg[key] = Math.min(max, Math.max(min, cfg[key] + delta));
  document.getElementById(key + 'Val').textContent = cfg[key];
}

function goStep1() {
  // 현재 cfg 값을 카운터에 반영
  document.getElementById('peopleVal').textContent = cfg.people;
  document.getElementById('roundsVal').textContent = cfg.rounds;
  show('step1');
}

function goStep2() {
  if (names.length !== cfg.people) {
    names = Array.from({length: cfg.people}, (_, i) => names[i] || '');
  }
  // 첫번째는 항상 벙주
  names[0] = '벙주';

  document.getElementById('settingBadges').innerHTML =
    `<div class="badge">인원 <span>${cfg.people}명</span></div>` +
    `<div class="badge">차수 <span>${cfg.rounds}차</span></div>`;

  document.getElementById('nameList').innerHTML = names.map((n, i) => {
    if (i === 0) {
      return `
        <div class="name-row bj-row" style="animation-delay:0s">
          <div class="name-num av6">1</div>
          <input class="name-input" type="text" value="벙주" disabled />
          <span class="bj-badge">👑 벙주</span>
        </div>`;
    }
    return `
      <div class="name-row" style="animation-delay:${i*0.03}s">
        <div class="name-num av${i%10}">${i+1}</div>
        <input class="name-input" type="text" placeholder="${i+1}번째 참여자" value="${n}"
          oninput="names[${i}]=this.value"
          onkeydown="if(event.key==='Enter'){var nx=document.querySelectorAll('.name-input:not(:disabled)')[${i}];if(nx)nx.focus();}" />
      </div>`;
  }).join('');

  show('step2');
}

function goStep3() {
  names[0] = '벙주';
  names = names.map((n, i) => i === 0 ? '벙주' : (n.trim() || `참여자${i+1}`));

  checks = Array.from({length: cfg.people}, (_, pi) =>
    Array.from({length: cfg.rounds}, (_, ri) =>
      (checks[pi] && checks[pi][ri] !== undefined) ? checks[pi][ri] : true
    )
  );

  if (roundCosts.length !== cfg.rounds)
    roundCosts = Array.from({length: cfg.rounds}, (_, i) => roundCosts[i] || '');

  if (prepays.length !== cfg.people)
    prepays = Array.from({length: cfg.people}, (_, i) => prepays[i] || '');

  renderSheet();
  show('step3');
}

function renderSheet() {
  // 감액 안내 업데이트
  updateDiscountInfo();

  // 차수 금액 카드
  document.getElementById('roundCosts').innerHTML =
    Array.from({length: cfg.rounds}, (_, r) => `
      <div class="round-cost-card">
        <div class="round-cost-label">${r+1}차 금액</div>
        <input class="round-cost-input" type="number" placeholder="0" min="0"
          value="${roundCosts[r]}"
          oninput="roundCosts[${r}]=this.value;calculate()" />
      </div>
    `).join('');

  // 테이블 헤더
  const roundHeaders = Array.from({length: cfg.rounds}, (_, r) => `
    <th>
      <button class="round-header-btn" onclick="toggleRound(${r})">
        <span class="round-header-label">${r+1}차 참여</span>
        <span class="round-count-badge" id="rc${r}">-</span>
      </button>
    </th>
  `).join('');

  // 테이블 rows
  const rows = names.map((name, pi) => {
    const isBj = pi === 0;
    const cells = Array.from({length: cfg.rounds}, (_, ri) => `
      <td class="check-cell">
        <button class="check-btn${checks[pi][ri]?' checked':''}" id="chk-${pi}-${ri}" onclick="toggleCheck(${pi},${ri})">
          <div class="check-icon">${checks[pi][ri]?'✓':''}</div>
        </button>
      </td>
    `).join('');

    const nameDisplay = isBj
      ? `<div class="avatar av6">${name.charAt(0)}</div>${name}<span class="bj-crown">👑</span>`
      : `<div class="avatar av${pi%10}">${name.charAt(0)}</div>${name}`;

    return `<tr>
      <td><div class="name-cell">${nameDisplay}</div></td>
      ${cells}
      <td class="prepay-cell">
        <input class="prepay-input" type="number" placeholder="0" min="0"
          value="${prepays[pi]}"
          oninput="prepays[${pi}]=this.value;calculate()" />
      </td>
    </tr>`;
  }).join('');

  document.getElementById('sheetTable').innerHTML = `
    <thead>
      <tr>
        <th class="name-th">이름</th>
        ${roundHeaders}
        <th class="prepay-th">선입금</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  `;

  calculate();
}

function updateDiscountInfo() {
  document.getElementById('discountInfo').innerHTML =
    `<strong>👑 벙주 감액 기준</strong><br>
    6~10인 참여 시 <strong>-5,000원</strong> &nbsp;·&nbsp;
    11~21인 시 <strong>-10,000원</strong> &nbsp;·&nbsp;
    22인 이상 시 <strong>-20,000원</strong><br>
    <span style="font-size:11px">감액분은 나머지 인원에게 균등 분배됩니다</span>`;
}

function toggleCheck(pi, ri) {
  checks[pi][ri] = !checks[pi][ri];
  const btn = document.getElementById(`chk-${pi}-${ri}`);
  btn.classList.toggle('checked', checks[pi][ri]);
  btn.querySelector('.check-icon').textContent = checks[pi][ri] ? '✓' : '';
  calculate();
}

function toggleRound(ri) {
  const allChecked = checks.every(row => row[ri]);
  checks.forEach(row => row[ri] = !allChecked);
  names.forEach((_, pi) => {
    const btn = document.getElementById(`chk-${pi}-${ri}`);
    if (btn) {
      btn.classList.toggle('checked', checks[pi][ri]);
      btn.querySelector('.check-icon').textContent = checks[pi][ri] ? '✓' : '';
    }
  });
  calculate();
}

function calculate() {
  // amounts[pi] = 해당 인원이 부담해야 할 총액 (선입금 전)
  const amounts = Array(cfg.people).fill(0);
  let grand = 0;
  // 차수별 상세 내역 (결과 표시용)
  const roundDetails = Array.from({length: cfg.people}, () => []);
  // 차수별 벙주 감액 정보
  const bjDiscountByRound = [];

  for (let r = 0; r < cfg.rounds; r++) {
    const cost = parseFloat(roundCosts[r]) || 0;
    const participants = checks.reduce((s, row) => s + (row[r] ? 1 : 0), 0);
    grand += cost;

    const el = document.getElementById(`rc${r}`);
    if (el) el.textContent = participants + '명';

    if (!cost || !participants) {
      bjDiscountByRound.push(0);
      continue;
    }

    const bjParticipates = checks[0][r]; // 벙주(pi=0) 참여 여부
    const discount = bjParticipates ? getBjDiscount(participants) : 0;
    bjDiscountByRound.push(discount);

    if (discount > 0 && bjParticipates) {
      // 벙주: 기본 인당금액 - 감액
      const baseShare = cost / participants;
      const bjShare = Math.max(0, baseShare - discount);
      // 나머지: (총액 - 벙주몫) / (참여자수 - 1)
      const othersTotal = cost - bjShare;
      const othersCount = participants - 1;
      const othersShare = othersCount > 0 ? othersTotal / othersCount : 0;

      checks.forEach((row, pi) => {
        if (!row[r]) return;
        const share = pi === 0 ? bjShare : othersShare;
        amounts[pi] += share;
        roundDetails[pi].push({ r, share, discount: pi === 0 ? discount : 0 });
      });
    } else {
      // 감액 없음: 균등 분배
      const share = cost / participants;
      checks.forEach((row, pi) => {
        if (!row[r]) return;
        amounts[pi] += share;
        roundDetails[pi].push({ r, share, discount: 0 });
      });
    }
  }

  document.getElementById('grandTotal').textContent = '₩' + fmt(grand);

  // 벙주 감액 총합 레이블
  const totalDiscount = bjDiscountByRound.reduce((a,b) => a+b, 0);
  document.getElementById('discountLabel').textContent =
    totalDiscount > 0 ? `벙주 총 -${fmt(totalDiscount)}원` : '';

  // 결과 렌더
  document.getElementById('resultRows').innerHTML = names.map((name, pi) => {
    const isBj = pi === 0;
    const prepay = parseFloat(prepays[pi]) || 0;

    const detailText = roundDetails[pi].map(d => {
      const base = `${d.r+1}차 ₩${fmt(d.share)}`;
      return d.discount > 0 ? `${base} (감액 -${fmt(d.discount)})` : base;
    }).join(' · ');

    const nameDisplay = isBj
      ? `<div class="avatar av6">${name.charAt(0)}</div>${name} 👑`
      : `<div class="avatar av${pi%10}">${name.charAt(0)}</div>${name}`;

    const rawFinal = amounts[pi] - prepay;
    const finalAmount = Math.round(rawFinal);

    let amountClass, amountText;
    if (finalAmount === 0) {
      amountClass = 'zero'; amountText = '정산 완료 ✓';
    } else if (finalAmount < 0) {
      amountClass = 'refund'; amountText = `환불 ₩${fmt(-finalAmount)}`;
    } else {
      amountClass = ''; amountText = `₩${fmt(finalAmount)}`;
    }

    const prepayNote = prepay > 0
      ? `<div class="result-prepay-note">선입금 ₩${fmt(prepay)} 차감${finalAmount < 0 ? ' → 초과 환불' : ''}</div>`
      : '';

    return `
      <div class="result-row${isBj?' bj-row-result':''}">
        <div class="result-name">${nameDisplay}</div>
        <div class="result-detail">
          <div class="result-amount ${amountClass}">${amountText}</div>
          ${detailText ? `<div class="result-rounds">${detailText}</div>` : ''}
          ${prepayNote}
        </div>
      </div>`;
  }).join('');
}

function fmt(n) {
  return Math.round(n).toLocaleString('ko-KR');
}

function show(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function shareResult() {
  const state = { cfg, names, roundCosts, checks, prepays };
  const encoded = btoa(encodeURIComponent(JSON.stringify(state)));
  const url = location.href.split('?')[0] + '?d=' + encoded;
  navigator.clipboard.writeText(url).then(() => {
    const t = document.getElementById('copyToast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }).catch(() => prompt('링크를 복사하세요:', url));
}

// URL 복원
(function() {
  const p = new URLSearchParams(location.search);
  const d = p.get('d');
  if (!d) return;
  try {
    const s = JSON.parse(decodeURIComponent(atob(d)));
    cfg = s.cfg;
    names = s.names;
    roundCosts = s.roundCosts;
    checks = s.checks;
    prepays = s.prepays || Array(cfg.people).fill('');
    document.getElementById('peopleVal').textContent = cfg.people;
    document.getElementById('roundsVal').textContent = cfg.rounds;
    renderSheet();
    show('step3');
  } catch(e) {}
})();
</script>
